<!DOCTYPE html>
<html lang="en">
<head>
<title>Multiplication Tables</title>
<link href="https://fonts.googleapis.com/css2?family=Righteous&family=Nunito:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0c29;
    --card: #18153a;
    --accent1: #fc6c85;
    --accent2: #ffd166;
    --accent3: #06d6a0;
    --accent4: #4cc9f0;
    --text: #f0eeff;
    --dim: rgba(240,238,255,.35);
  }

  body {
    min-height: 100vh;
    background: var(--bg);
    font-family: 'Nunito', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 16px;
    position: relative;
    overflow-x: hidden;
  }

  /* Gradient orbs */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(90px);
    pointer-events: none;
    opacity: .18;
  }
  .orb1 { width: 500px; height: 500px; background: #7b2ff7; top: -150px; left: -150px; }
  .orb2 { width: 400px; height: 400px; background: #fc6c85; bottom: -100px; right: -100px; }
  .orb3 { width: 300px; height: 300px; background: #06d6a0; top: 40%; left: 60%; }

  /* Input panel */
  .panel {
    position: relative;
    z-index: 10;
    width: min(480px, 100%);
    background: var(--card);
    border: 1px solid rgba(255,255,255,.08);
    box-shadow: 0 8px 40px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.06);
    padding: 40px 36px 36px;
    margin-bottom: 32px;
    animation: rise .7s cubic-bezier(.22,1,.36,1) both;
  }
  @keyframes rise {
    from { opacity:0; transform: translateY(30px) scale(.97); }
    to   { opacity:1; transform: translateY(0) scale(1); }
  }

  /* Rainbow top bar */
  .panel::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent1), var(--accent2), var(--accent3), var(--accent4));
  }

  .eyebrow {
    font-size: 10px;
    letter-spacing: .35em;
    text-transform: uppercase;
    color: var(--accent4);
    font-weight: 700;
    margin-bottom: 8px;
  }

  h1 {
    font-family: 'Righteous', cursive;
    font-size: 30px;
    color: var(--text);
    letter-spacing: .01em;
    margin-bottom: 32px;
    line-height: 1;
  }
  h1 span { color: var(--accent2); }

  /* Input row */
  .input-row {
    display: flex;
    gap: 10px;
    align-items: stretch;
  }

  .input-wrap {
    flex: 1;
    position: relative;
  }
  #numInput {
    width: 100%;
    background: rgba(255,255,255,.05);
    border: 1px solid rgba(255,255,255,.1);
    color: var(--text);
    font-family: 'Righteous', cursive;
    font-size: 28px;
    text-align: center;
    padding: 14px 16px;
    outline: none;
    letter-spacing: .05em;
    transition: border-color .2s, box-shadow .2s;
    -moz-appearance: textfield;
  }
  #numInput::-webkit-inner-spin-button,
  #numInput::-webkit-outer-spin-button { display: none; }
  #numInput::placeholder { color: rgba(255,255,255,.15); font-size: 18px; letter-spacing: 0; }
  #numInput:focus {
    border-color: var(--accent4);
    box-shadow: 0 0 0 3px rgba(76,201,240,.12);
  }

  .stepper {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .stepper button {
    flex: 1;
    width: 36px;
    background: rgba(255,255,255,.06);
    border: 1px solid rgba(255,255,255,.1);
    color: var(--dim);
    font-size: 14px;
    cursor: pointer;
    transition: background .15s, color .15s;
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
  }
  .stepper button:hover { background: rgba(255,255,255,.12); color: var(--text); }

  #btnGen {
    padding: 0 24px;
    background: linear-gradient(135deg, var(--accent1), #c43d80);
    color: #fff;
    font-family: 'Righteous', cursive;
    font-size: 14px;
    letter-spacing: .08em;
    border: none;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(252,108,133,.35);
    transition: transform .12s, box-shadow .2s, filter .2s;
    white-space: nowrap;
  }
  #btnGen:hover { filter: brightness(1.1); box-shadow: 0 6px 28px rgba(252,108,133,.5); }
  #btnGen:active { transform: scale(.96); }

  /* Range row */
  .range-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 16px;
  }
  .range-row label {
    font-size: 11px;
    letter-spacing: .15em;
    text-transform: uppercase;
    color: var(--dim);
    white-space: nowrap;
  }
  input[type="range"] {
    flex: 1;
    -webkit-appearance: none;
    height: 3px;
    background: rgba(255,255,255,.1);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: var(--accent3);
    box-shadow: 0 0 8px rgba(6,214,160,.5);
    transition: transform .15s;
  }
  input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.3); }
  .range-val {
    font-family: 'Righteous', cursive;
    font-size: 16px;
    color: var(--accent3);
    min-width: 28px;
    text-align: right;
  }

  /* Error */
  .error {
    font-size: 12px;
    color: var(--accent1);
    letter-spacing: .1em;
    margin-top: 12px;
    min-height: 16px;
    text-transform: uppercase;
  }

  /* Results area */
  #output {
    position: relative;
    z-index: 10;
    width: min(480px, 100%);
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .table-title {
    font-family: 'Righteous', cursive;
    font-size: 22px;
    color: var(--text);
    letter-spacing: .05em;
    animation: fadeIn .4s ease both;
  }
  .table-title span { color: var(--accent2); }

  @keyframes fadeIn {
    from { opacity:0; transform: translateX(-12px); }
    to   { opacity:1; transform: translateX(0); }
  }

  .row {
    display: flex;
    align-items: center;
    gap: 0;
    background: var(--card);
    border: 1px solid rgba(255,255,255,.05);
    overflow: hidden;
    animation: rowIn .3s ease both;
  }
  @keyframes rowIn {
    from { opacity:0; transform: translateX(-20px); }
    to   { opacity:1; transform: translateX(0); }
  }

  .row-accent {
    width: 4px;
    align-self: stretch;
    flex-shrink: 0;
  }

  .row-num {
    font-family: 'Righteous', cursive;
    font-size: 13px;
    color: var(--dim);
    padding: 14px 14px 14px 16px;
    min-width: 36px;
    text-align: center;
  }

  .row-eq {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 16px;
    font-family: 'Nunito', sans-serif;
    font-size: 16px;
    font-weight: 600;
  }

  .eq-base { color: var(--accent4); font-size: 18px; font-family: 'Righteous', cursive; }
  .eq-op   { color: var(--dim); font-size: 14px; }
  .eq-mult { color: var(--text); font-family: 'Righteous', cursive; font-size: 18px; }
  .eq-equals { color: var(--dim); font-size: 14px; }
  .eq-result {
    font-family: 'Righteous', cursive;
    font-size: 22px;
    margin-left: auto;
    padding-right: 4px;
  }

  /* Progress bar inside row */
  .row-bar {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    background: rgba(255,255,255,.025);
    pointer-events: none;
  }

  .row { position: relative; }
</style>
</head>
<body>

<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<div class="panel">
  <div class="eyebrow">Math Tool</div>
  <h1>Times <span>Tables</span></h1>

  <div class="input-row">
    <div class="input-wrap">
      <input type="number" id="numInput" placeholder="Enter a number" min="-999" max="999">
    </div>
    <div class="stepper">
      <button onclick="step(1)">▲</button>
      <button onclick="step(-1)">▼</button>
    </div>
    <button id="btnGen" onclick="generate()">Generate ✦</button>
  </div>

  <div class="range-row">
    <label>Up to</label>
    <input type="range" id="upTo" min="5" max="20" value="10" oninput="updateRange()">
    <span class="range-val" id="rangeVal">10</span>
  </div>

  <div class="error" id="errMsg"></div>
</div>

<div id="output"></div>

<script>
  const colors = [
    '#fc6c85','#ffd166','#06d6a0','#4cc9f0',
    '#c77dff','#ff9a3c','#80ffdb','#f72585'
  ];

  function updateRange() {
    document.getElementById('rangeVal').textContent = document.getElementById('upTo').value;
  }

  function step(dir) {
    const el = document.getElementById('numInput');
    el.value = (parseInt(el.value) || 0) + dir;
  }

  function generate() {
    const raw = document.getElementById('numInput').value.trim();
    const errEl = document.getElementById('errMsg');
    const out = document.getElementById('output');

    if (raw === '' || isNaN(raw)) {
      errEl.textContent = '⚠ Please enter a valid number';
      out.innerHTML = '';
      return;
    }
    errEl.textContent = '';

    const n    = parseInt(raw);
    const upTo = parseInt(document.getElementById('upTo').value);
    const max  = n * upTo;
    const color = colors[Math.abs(n) % colors.length];

    let html = `<div class="table-title" style="animation-delay:0s">Table of <span style="color:${color}">${n}</span></div>`;

    for (let k = 1; k <= upTo; k++) {
      const result = n * k;
      const pct    = Math.abs(result) / Math.abs(max) * 100;
      const delay  = (k * 0.04).toFixed(2);
      html += `
        <div class="row" style="animation-delay:${delay}s">
          <div class="row-bar" style="width:${pct}%"></div>
          <div class="row-accent" style="background:${color};opacity:${0.4 + k/upTo*0.6}"></div>
          <div class="row-num">${k}</div>
          <div class="row-eq">
            <span class="eq-base" style="color:${color}">${n}</span>
            <span class="eq-op">×</span>
            <span class="eq-mult">${k}</span>
            <span class="eq-equals">=</span>
            <span class="eq-result" style="color:${color}">${result}</span>
          </div>
        </div>`;
    }

    out.innerHTML = html;
  }

  // Generate on Enter
  document.getElementById('numInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') generate();
  });
</script>
</body>
</html>
